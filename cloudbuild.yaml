# =====================================================================
# Optimized Cloud Build Configuration (Modern gcloud storage syntax)
# Speed Enhancements: High-CPU VM, Dependency Caching, and Kaniko Cache
# =====================================================================

options:
  # 1. SPEED UP: Upgrade build VM to 8 vCPUs / 8GB RAM (Default is only 2 vCPU)
  machineType: 'E2_HIGHCPU_8'

steps:
  # 2. SPEED UP: Restore package dependencies from GCS using gcloud storage
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:latest'
    entrypoint: 'bash'
    args:
    - '-c'
    - |
      echo "Restoring cache from GCS bucket if it exists..."
      gcloud storage cp gs://nstrimio-build-cache/node_cache.tar.gz node_cache.tar.gz || true
      if [ -f node_cache.tar.gz ]; then
        tar -xzf node_cache.tar.gz
      fi

  # 3. BUILD: Run your installation and package steps (using Node as an example)
  - name: 'gcr.io/cloud-builders/npm'
    entrypoint: 'bash'
    args:
    - '-c'
    - |
      npm install --prefer-offline --no-audit

  # 4. SPEED UP: Save dependencies back to GCS using gcloud storage
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:latest'
    entrypoint: 'bash'
    args:
    - '-c'
    - |
      echo "Compressing and saving dependencies back to GCS..."
      tar -czf node_cache.tar.gz node_modules
      gcloud storage cp node_cache.tar.gz gs://nstrimio-build-cache/node_cache.tar.gz

  # 5. SPEED UP: Use Kaniko to compile the Docker image and cache unchanged layers
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
    - --destination=europe-west1-docker.pkg.dev/nstrimio/cloud-run-source-deploy/backend/go-live-test-zkydk-backend:latest
    - --cache=true
    - --cache-ttl=24h
    - --cache-dir=gs://nstrimio-build-cache/kaniko-cache

# Prevent hung tasks from consuming build quotas
timeout: '1200s'
