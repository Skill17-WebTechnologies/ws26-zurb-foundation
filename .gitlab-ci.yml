variables:
  # Port the container serves on inside the pod. The Service/Ingress stay on 80 externally
  # and route to this port, so `docker compose up` and the cluster stay consistent.
  APP_PORT: "80"

stages:
  - build
  - deploy

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script: []
  script:
    - docker login -u $HARBOR_USER -p $HARBOR_PASSWORD $HARBOR_REGISTRY
    - docker build -t $HARBOR_REGISTRY/$HARBOR_PROJECT/$CI_PROJECT_PATH:$CI_COMMIT_SHORT_SHA .
    - docker push $HARBOR_REGISTRY/$HARBOR_PROJECT/$CI_PROJECT_PATH:$CI_COMMIT_SHORT_SHA

deploy:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  before_script: []
  script:
    - kubectl config set-cluster k8s --server="$KUBE_URL" --certificate-authority="$KUBE_CA_PEM_FILE"
    - kubectl config set-credentials gitlab --token="$KUBE_TOKEN"
    - kubectl config set-context default --cluster=k8s --user=gitlab
    - kubectl config use-context default
    - kubectl cluster-info

    # Build service name from last two path segments: competitor01/backend02 → competitor01-backend02
    - export SERVICE_NAME=$(echo $CI_PROJECT_PATH | tr '[:upper:]' '[:lower:]' | rev | cut -d'/' -f1-2 | rev | tr '/' '-' | tr '_' '-')
    - export IMAGE=$HARBOR_REGISTRY/$HARBOR_PROJECT/$CI_PROJECT_PATH:$CI_COMMIT_SHORT_SHA
    - echo "Service name is $SERVICE_NAME"
    - echo "Image is $IMAGE"
    - echo "App port is $APP_PORT"
    - echo "Ingress host is $KUBE_INGRESS_HOST"

    - |
      cat <<EOF | kubectl apply -f -
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: $SERVICE_NAME
        namespace: default
        labels:
          app: $SERVICE_NAME
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: $SERVICE_NAME
        template:
          metadata:
            labels:
              app: $SERVICE_NAME
              log_kind: application
          spec:
            imagePullSecrets:
              - name: harbor-registry
            containers:
              - name: $SERVICE_NAME
                image: $IMAGE
                ports:
                  - containerPort: $APP_PORT
      ---
      apiVersion: v1
      kind: Service
      metadata:
        name: $SERVICE_NAME
        namespace: default
        labels:
          app: $SERVICE_NAME
      spec:
        selector:
          app: $SERVICE_NAME
        ports:
          - protocol: TCP
            port: 80
            targetPort: $APP_PORT
      ---
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: $SERVICE_NAME
        namespace: default
      spec:
        rules:
          - host: $KUBE_INGRESS_HOST
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: $SERVICE_NAME
                      port:
                        number: 80
      EOF
    - kubectl rollout status deployment/$SERVICE_NAME -n default
  environment: production
